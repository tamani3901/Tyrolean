<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>チロルジャン 2009</title>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
    body {
      font-family: 'Hiragino Sans', sans-serif; background: #fdf6ec; color: #4a3b2f;
      display: flex; flex-direction: column; align-items: center; padding: 8px 8px 30px; min-height: 100vh;
    }
    h1 { font-size: 1.6rem; color: #8b5a2b; margin: 6px 0 2px; }
    #passwordScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fdf6ec; display: flex; align-items: center; justify-content: center;
      z-index: 200; flex-direction: column; gap: 12px;
    }
    #passwordInput {
      padding: 10px 16px; border-radius: 24px; border: 2px solid #d49b3b;
      font-size: 1rem; width: 200px; text-align: center;
    }
    .mode-bar { display: flex; gap: 8px; margin: 6px 0; }
    .mode-btn {
      padding: 6px 16px; border-radius: 20px; border: 2px solid #d49b3b;
      background: #fff; font-weight: bold; cursor: pointer;
    }
    .mode-btn.active { background: #f0c27a; border-color: #b37b44; }
    .container { width: 100%; max-width: 500px; }
    .yaku-banner {
      width: 100%; height: 140px; background: #f7ede0; border: 2px dashed #c9a87c;
      border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center;
      justify-content: center; overflow: hidden;
    }
    .yaku-banner img { max-height: 100%; max-width: 100%; object-fit: contain; }
    .hand-area {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 70px; margin: 6px 0;
    }
    .piece-slot {
      width: 60px; height: 60px; background: #f5e1c4; border-radius: 12px;
      border: 3px solid #c9a16e; cursor: pointer; background-size: cover; transition: 0.1s;
    }
    .piece-slot img { width: 100%; height: 100%; border-radius: 9px; object-fit: cover; }
    .piece-slot.empty { background: #f3ede5; border: 2px dashed #d6c3a5; cursor: default; }
    .piece-slot.selected { border-color: #e05a2a; box-shadow: 0 0 8px #e05a2a; }
    .box-section { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0; }
    .box-image {
      width: 80px; height: 80px; background: #d9b382; border-radius: 16px;
      border: 4px solid #b78b5a; cursor: pointer; background-size: cover;
    }
    .btn {
      background: #f0c27a; border: none; border-radius: 30px; padding: 10px 20px;
      font-weight: bold; font-size: 0.95rem; color: #4a3b2f; box-shadow: 0 4px 0 #b37b44;
      margin: 4px; cursor: pointer; transition: 0.08s;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b37b44; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }
    .message { font-weight: bold; margin: 6px 0; color: #b45f2a; text-align: center; }
    .discard-area {
      background: #fef9f0; border-radius: 20px; padding: 8px; margin: 6px 0;
      border: 2px solid #e6c89e; font-size: 0.8rem;
    }
    .discard-history { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .discard-chip {
      width: 36px; height: 36px; border-radius: 8px; background: #f5e1c4;
      border: 2px solid #aaa; display: flex; align-items: center; justify-content: center;
    }
    .discard-chip.latest { border-color: #e05a2a; box-shadow: 0 0 6px #e05a2a; cursor: pointer; }
    .room-area {
      background: #fffbf2; border: 2px solid #d49b3b; border-radius: 16px;
      padding: 12px; margin: 10px 0; width: 100%; max-width: 500px; text-align: center;
    }
    .room-input {
      padding: 8px 12px; font-size: 1.5rem; width: 180px; text-align: center;
      border-radius: 12px; border: 2px solid #d49b3b;
    }
    .rules-box {
      background: #fffbf2; border: 2px solid #e6c89e; border-radius: 16px;
      padding: 10px; margin: 8px 0; font-size: 0.75rem; max-width: 500px;
    }
    #reachModal, #resultModal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); display: flex; align-items: center;
      justify-content: center; z-index: 150; flex-direction: column;
    }
    #reachModalContent, #resultModalContent {
      background: #fffbf2; border-radius: 20px; padding: 16px; max-width: 360px; width: 90%;
      text-align: center;
    }
    .reach-yaku-item {
      padding: 10px; background: #fef9f0; border: 2px solid #d49b3b;
      border-radius: 12px; margin: 6px 0; cursor: pointer;
    }
    .reach-badge {
      display: inline-block; background: #f0c27a; border-radius: 20px;
      padding: 4px 12px; font-weight: bold; margin-left: 8px;
    }
    #reachBadge {
      display: none; position: fixed; top: 10px; right: 10px;
      background: #e05a2a; color: white; padding: 4px 14px; border-radius: 20px;
      font-weight: bold; z-index: 50; font-size: 0.9rem;
    }

    /* 4人対戦用の対戦相手エリア */
    .opponents-row {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 6px 0;
    }
    .opponent-card {
      background: #fef9f0; border-radius: 16px; padding: 8px; border: 2px solid #e6c89e;
      min-width: 150px; flex: 1; max-width: 220px; font-size: 0.8rem;
    }

    /* PC用ワイド */
    @media (min-width: 768px) {
      .container { max-width: 900px; }
      .piece-slot { width: 72px; height: 72px; }
      .box-image { width: 96px; height: 96px; }
      .hand-area { gap: 10px; }
    }
  </style>
</head>
<body>
  <div id="passwordScreen">
    <h2>🔐 パスワードを入力</h2>
    <input type="password" id="passwordInput" placeholder="パスワード">
    <button class="btn" id="passwordSubmitBtn">入室</button>
    <p id="passwordError" style="color:#a33; font-size:0.9rem;"></p>
  </div>

  <div id="reachBadge">⚡リーチ中</div>

  <div id="mainApp" style="display:none; flex-direction:column; align-items:center; width:100%;">
    <h1>🍫チロルジャン 2009</h1>
    <div class="mode-bar">
      <button class="mode-btn active" id="soloModeBtn">🧑‍💻 CPU対戦</button>
      <button class="mode-btn" id="battleModeBtn">⚔️ オンライン対戦</button>
    </div>

    <div id="p2pArea" style="display:none; width:100%; max-width:500px; text-align:center;">
      <div class="room-area">
        <p><strong>対戦を始める（2〜4人）</strong></p>
        <div><input class="room-input" id="roomCodeInput" placeholder="合言葉(数字4桁)" maxlength="6">
        <button class="btn" id="createRoomBtn">📝 部屋を作る</button></div>
        <div>または</div>
        <div><input class="room-input" id="joinCodeInput" placeholder="合言葉を入力" maxlength="6">
        <button class="btn" id="joinRoomBtn">🔑 参加</button></div>
        <div id="roomPlayers" style="margin-top:8px; font-size:0.9rem;"></div>
        <button class="btn" id="startGameBtn" style="display:none;">▶️ ゲーム開始</button>
      </div>
      <div id="connectionStatus" style="margin-top:8px;">未接続</div>
    </div>

    <!-- 対戦相手一覧 -->
    <div class="opponents-row" id="opponentsContainer"></div>

    <!-- 自分の捨て牌エリア -->
    <div class="discard-area">
      <div>🗑️ あなたの捨て牌:</div>
      <div class="discard-history" id="myDiscardHistory"></div>
    </div>

    <div class="container" id="gameArea">
      <div class="yaku-banner"><img src="" alt="役一覧" id="yakuBannerImg"></div>
      <div class="hand-area" id="handContainer"></div>
      <div class="box-section">
        <div class="box-image" id="boxImage"></div>
        <div>残り <span id="boxRemaining">84</span> 枚</div>
      </div>
      <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
        <button class="btn" id="newGameBtn">🔄 新しいゲーム</button>
        <button class="btn" id="resetPointsBtn">💰 ポイントリセット</button>
      </div>
      <div class="message" id="messageArea"></div>
      <div>持ち点: <span id="totalPoints">300</span>pt</div>
    </div>
  </div>

  <div id="reachModal" style="display:none;"><div id="reachModalContent"></div></div>
  <div id="resultModal" style="display:none;"><div id="resultModalContent"></div></div>

  <script>
    const GAME_PASSWORD = '1606tamani';
    const IMAGE_BASE_URL = 'https://raw.githubusercontent.com/tamani3901/Tyrolean/main/img/';

    document.getElementById('passwordSubmitBtn').addEventListener('click', () => {
      if (document.getElementById('passwordInput').value === GAME_PASSWORD) {
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        initGame();
      } else {
        document.getElementById('passwordError').textContent = 'パスワードが違います';
      }
    });

    function initGame() {
      document.getElementById('yakuBannerImg').src = IMAGE_BASE_URL + 'yaku_all.png';

      const PIECE_TYPES = [
        { id:0, name:'コーヒーヌガー', color:'brown', count:9, file:'coffee_nougat.png' },
        { id:1, name:'ホワイトビス',   color:'blue',  count:6, file:'white_bis.png' },
        { id:2, name:'ミルク',         color:'white', count:9, file:'milk.png' },
        { id:3, name:'コーヒーフロート', color:'brown', count:6, file:'coffee_float.png' },
        { id:4, name:'シナモンオレ',   color:'skin',  count:6, file:'cinnamon_ole.png' },
        { id:5, name:'バニラプリン',   color:'skin',  count:6, file:'vanilla_pudding.png' },
        { id:6, name:'塩バニラ',       color:'blue',  count:6, file:'salt_vanilla.png' },
        { id:7, name:'きなこ',         color:'skin',  count:9, file:'kinako.png' },
        { id:8, name:'いちご大福',     color:'white', count:6, file:'ichigo_daifuku.png' },
        { id:9, name:'みるく大福',     color:'white', count:6, file:'milk_daifuku.png' },
        { id:10,name:'アーモンド',     color:'blue',  count:9, file:'almond.png' },
        { id:11,name:'ヘーゼルナッツ', color:'brown', count:6, file:'hazelnut.png' }
      ].map(t => ({ ...t, img: IMAGE_BASE_URL + t.file }));

      const YAKU_LIST = [
        { name:'オールワン', pts:300, check:c=>c.some(v=>v===9) },
        { name:'タブルセット', pts:150, check:c=>c.some(v=>v>=6) },
        { name:'ミルクセット', pts:120, check:c=>c[2]===3&&c[9]===3&&c[6]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'おもちセット', pts:120, check:c=>c[7]===3&&c[8]===3&&c[9]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'ワンカラーセット', pts:90, check:(c,hand)=>hand.every(id=>PIECE_TYPES[id].color===PIECE_TYPES[hand[0]].color) },
        { name:'ドリンクセット', pts:90, check:c=>c[2]===3&&c[3]===3&&c[4]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'サクサクおやつセット', pts:90, check:c=>c[10]===3&&c[1]===3&&c[11]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'キャラセット', pts:75, check:c=>{
          const allowed=[10,5,3,7,11]; const present=allowed.filter(i=>c[i]===3);
          return present.length===3 && allowed.every(i=>c[i]===3||c[i]===0) && c.reduce((a,b)=>a+b,0)===9;
        }},
        { name:'基本セット', pts:60, check:c=>c[0]===3&&c[2]===3&&c[10]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'アフタヌーンセット', pts:45, check:c=>{
          if(c[2]!==3) return false;
          const g1=[0,1], g2=[3,4,5,6];
          const g1ok=g1.filter(i=>c[i]===3).length===1 && g1.every(i=>c[i]===3||c[i]===0);
          const g2ok=g2.filter(i=>c[i]===3).length===1 && g2.every(i=>c[i]===3||c[i]===0);
          return g1ok&&g2ok && c.reduce((a,b)=>a+b,0)===9;
        }},
        { name:'バラエティ', pts:30, check:c=>{
          const non=[1,3,4,5,6,7,8,9,11];
          return non.every(i=>c[i]===1) && c[0]===0&&c[2]===0&&c[10]===0;
        }}
      ];

      // ---------- ゲーム状態 ----------
      let box=[], players=[], currentPlayerIndex=0, totalPoints=300, gameFinished=false;
      let currentMode='cpu'; // 'cpu' or 'online'
      let myPlayerId = 0; // 自分のインデックス
      let peer=null, connections={}, roomId=null, isHost=false;
      let cpuHand=[], cpuDiscard=[], cpuReach=false;
      let selectedDiscardIndex=null;
      let inReach=false, reachNeedPieceIds=[], reachYakuName='';

      const DOM = {
        handContainer: document.getElementById('handContainer'),
        boxRemaining: document.getElementById('boxRemaining'),
        messageArea: document.getElementById('messageArea'),
        totalPoints: document.getElementById('totalPoints'),
        myDiscardHistory: document.getElementById('myDiscardHistory'),
        opponentsContainer: document.getElementById('opponentsContainer'),
        reachBadge: document.getElementById('reachBadge'),
        reachModal: document.getElementById('reachModal'),
        reachModalContent: document.getElementById('reachModalContent'),
        resultModal: document.getElementById('resultModal'),
        resultModalContent: document.getElementById('resultModalContent'),
        roomPlayers: document.getElementById('roomPlayers'),
        startGameBtn: document.getElementById('startGameBtn'),
      };

      function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
      function createBox(){ const p=[]; PIECE_TYPES.forEach((t,i)=>{ for(let j=0;j<t.count;j++) p.push(i); }); return shuffle(p); }
      function getCounts(h){ const c=Array(12).fill(0); h.forEach(id=>c[id]++); return c; }
      function isValidHand(hand){ const c=getCounts(hand); return c.filter(v=>v===3).length===3 && c.reduce((a,b)=>a+b,0)===9; }
      function checkYaku(h){
        const c=getCounts(h);
        for(let y of YAKU_LIST) if(y.check(c,h)) return {name:y.name, pts:y.pts};
        if(isValidHand(h)) return {name:'なんでも3種', pts:15};
        return null;
      }
      function getReachOptions(currentHand){
        if(currentHand.length!==8) return [];
        const options=[];
        for(let pieceId=0; pieceId<12; pieceId++){
          const testHand=[...currentHand, pieceId];
          const yaku=checkYaku(testHand);
          if(yaku && !options.some(o=>o.yakuName===yaku.name&&o.needPieceId===pieceId)){
            options.push({yakuName:yaku.name, pts:yaku.pts, needPieceId:pieceId});
          }
        }
        return options;
      }

      function getMyHand(){ return players[myPlayerId]?.hand || []; }
      function setMyHand(h){ if(players[myPlayerId]) players[myPlayerId].hand = h; }
      function getMyDiscard(){ return players[myPlayerId]?.discard || []; }

      function renderHand(){
        DOM.handContainer.innerHTML='';
        const hand = getMyHand();
        for(let i=0;i<9;i++){
          const s=document.createElement('div'); s.className='piece-slot';
          if(i<hand.length){
            const t=PIECE_TYPES[hand[i]];
            const img=document.createElement('img'); img.src=t.img; img.alt=t.name;
            s.appendChild(img);
            s.addEventListener('click',()=>selectDiscard(i));
          }else s.classList.add('empty');
          DOM.handContainer.appendChild(s);
        }
      }

      function selectDiscard(index){
        if(!isMyTurn() || getMyHand().length!==9){ setMsg('9枚のときに捨てる牌を選んでください', false); return; }
        DOM.handContainer.querySelectorAll('.piece-slot').forEach(s=>s.classList.remove('selected'));
        selectedDiscardIndex=index;
        DOM.handContainer.querySelectorAll('.piece-slot')[index].classList.add('selected');
        setMsg(`「${PIECE_TYPES[getMyHand()[index]].name}」を捨てますか？ もう一度タップで決定`, true);
      }

      function confirmDiscard(){
        if(selectedDiscardIndex===null || getMyHand().length!==9){ setMsg('捨てる牌を選んでください', false); return; }
        const hand = getMyHand();
        const piece=hand.splice(selectedDiscardIndex,1)[0];
        setMyHand(hand);
        players[myPlayerId].discard.push(piece);
        renderHand(); renderMyDiscard(); selectedDiscardIndex=null;
        setMsg(`${PIECE_TYPES[piece].name}を捨てました`);
        if(currentMode==='cpu'){ broadcastDiscard(piece); nextTurn(); }
        else { sendToHost({type:'discard', pieceId:piece, hand, discard:players[myPlayerId].discard}); }
        if(!inReach && getMyHand().length===8){
          const options=getReachOptions(getMyHand());
          if(options.length>0) showReachOptions(options);
        }
      }

      function renderMyDiscard(){
        DOM.myDiscardHistory.innerHTML='';
        const disc = getMyDiscard();
        disc.forEach(id=>{
          const chip=document.createElement('div'); chip.className='discard-chip';
          const img=document.createElement('img'); img.src=PIECE_TYPES[id].img; img.style.width='100%';
          chip.appendChild(img);
          DOM.myDiscardHistory.appendChild(chip);
        });
      }

      function renderOpponents(){
        DOM.opponentsContainer.innerHTML='';
        players.forEach((p,idx)=>{
          if(idx===myPlayerId) return;
          const card=document.createElement('div'); card.className='opponent-card';
          card.innerHTML = `<strong>${p.name}</strong> (${p.points}pt)<br>手札: ${p.hand.length}枚`;
          const discDiv=document.createElement('div'); discDiv.className='discard-history';
          p.discard.forEach((id, i)=>{
            const chip=document.createElement('div'); chip.className='discard-chip';
            const img=document.createElement('img'); img.src=PIECE_TYPES[id].img; img.style.width='100%';
            if(i===p.discard.length-1){ chip.classList.add('latest'); chip.addEventListener('click',()=>ronWithDiscard(id)); }
            chip.appendChild(img);
            discDiv.appendChild(chip);
          });
          card.appendChild(discDiv);
          DOM.opponentsContainer.appendChild(card);
        });
      }

      function updateBox(){ DOM.boxRemaining.textContent=box.length; }
      function setMsg(t,good=true){ DOM.messageArea.textContent=t; DOM.messageArea.style.color=good?'#b45f2a':'#a33'; }

      function isMyTurn(){ return players.length>0 && currentPlayerIndex===myPlayerId && !gameFinished; }

      function showReachOptions(options){
        DOM.reachModalContent.innerHTML='<h3>リーチしますか？</h3><p>可能な役:</p>';
        options.forEach(opt=>{
          const div=document.createElement('div'); div.className='reach-yaku-item';
          div.innerHTML=`${opt.yakuName} <span class="reach-badge">${opt.pts}pt</span><br><small>必要: ${PIECE_TYPES[opt.needPieceId].name}</small>`;
          div.addEventListener('click',()=>{
            inReach=true; reachNeedPieceIds=[opt.needPieceId]; reachYakuName=opt.yakuName;
            DOM.reachModal.style.display='none'; DOM.reachBadge.style.display='block';
            setMsg(`リーチ: ${opt.yakuName}`);
          });
          DOM.reachModalContent.appendChild(div);
        });
        const cancelBtn=document.createElement('button'); cancelBtn.className='btn'; cancelBtn.textContent='いいえ';
        cancelBtn.addEventListener('click',()=>{ DOM.reachModal.style.display='none'; });
        DOM.reachModalContent.appendChild(cancelBtn);
        DOM.reachModal.style.display='flex';
      }

      function drawFromBox(){
        if(!isMyTurn() || getMyHand().length>=9 || box.length===0) return;
        if(getMyHand().length!==8){ setMsg('8枚のときに引いてください', false); return; }
        const id=box.pop(); const hand=getMyHand(); hand.push(id); setMyHand(hand);
        updateBox(); renderHand();
        if(currentMode==='cpu') broadcastDraw(id);

        if(getMyHand().length===9){
          if(inReach){
            if(reachNeedPieceIds.includes(id)){
              const yaku=checkYaku(getMyHand());
              if(yaku){ winGame(yaku,'tsumo'); return; }
            }
            const discardId=getMyHand().pop(); setMyHand(getMyHand());
            players[myPlayerId].discard.push(discardId);
            setMsg(`${PIECE_TYPES[discardId].name}を引いたが不要なので捨てます`, true);
            setTimeout(()=>{
              renderHand(); renderMyDiscard(); updateBox();
              if(currentMode==='cpu'){ broadcastDiscard(discardId); nextTurn(); }
              else sendToHost({type:'discard', pieceId:discardId, hand:getMyHand(), discard:players[myPlayerId].discard});
              if(!inReach && getMyHand().length===8){
                const options=getReachOptions(getMyHand());
                if(options.length>0) showReachOptions(options);
              }
            },800);
            return;
          }
          const yaku=checkYaku(getMyHand());
          if(yaku){ winGame(yaku,'tsumo'); }
          else { setMsg('役がありません。捨てる牌を選んでください'); }
        } else { setMsg(`${PIECE_TYPES[id].name}を引きました`); }
      }

      function ronWithDiscard(discardId){
        if(!isMyTurn() || getMyHand().length!==8) return;
        const testHand=[...getMyHand(), discardId];
        const yaku=checkYaku(testHand);
        if(yaku){
          if(inReach && !reachNeedPieceIds.includes(discardId)){ setMsg('リーチ中の必要牌ではありません', false); return; }
          getMyHand().push(discardId);
          winGame(yaku,'ron');
        } else { setMsg('その牌ではアガれません', false); }
      }

      function winGame(yaku, method){
        gameFinished=true; inReach=false; DOM.reachBadge.style.display='none';
        totalPoints += yaku.pts; DOM.totalPoints.textContent=totalPoints;
        players[myPlayerId].points = totalPoints;
        // 相手のポイントを減らす
        players.forEach((p,idx)=>{
          if(idx===myPlayerId) return;
          p.points -= yaku.pts;
          if(p.points < 0) p.points = 0;
        });
        if(currentMode==='cpu') cpuHand=[];
        renderOpponents();
        showResult(true, yaku);
        if(currentMode==='online') sendToHost({type:'win', yaku:yaku, method:method, points:totalPoints});
      }

      function showResult(winner, yaku){
        const msg = winner ? `🎉 あなたの勝ち！ ${yaku.name} (+${yaku.pts}pt)` : `😢 あなたの負け。 ${yaku.name} (-${yaku.pts}pt)`;
        DOM.resultModalContent.innerHTML = `<h2>${msg}</h2><button class="btn" id="resultOkBtn">OK</button>`;
        DOM.resultModal.style.display='flex';
        document.getElementById('resultOkBtn').addEventListener('click', ()=>{
          DOM.resultModal.style.display='none';
          if(currentMode==='cpu') newCpuGame();
          else { /* オンラインではホストが新ラウンドを開始 */ }
        });
      }

      // ---- CPU対戦 ----
      function newCpuGame(){
        box=createBox();
        players=[
          {name:'あなた', hand:box.splice(0,8), discard:[], points:totalPoints},
          {name:'CPU', hand:box.splice(0,8), discard:[], points:300}
        ];
        myPlayerId=0; currentPlayerIndex=Math.floor(Math.random()*2);
        gameFinished=false; inReach=false; cpuReach=false;
        DOM.reachBadge.style.display='none';
        updateBox(); renderHand(); renderMyDiscard(); renderOpponents();
        if(currentPlayerIndex===0) setMsg('あなたの番です');
        else { setMsg('CPUの番です'); setTimeout(cpuTurn, 1000); }
      }

      function cpuTurn(){
        if(gameFinished || currentPlayerIndex!==1) return;
        if(box.length===0) return;
        const id=box.pop(); cpuHand.push(id); updateBox();
        if(cpuHand.length===9){
          const yaku=checkYaku(cpuHand);
          if(yaku){
            gameFinished=true;
            totalPoints -= yaku.pts; DOM.totalPoints.textContent=totalPoints;
            players[0].points = totalPoints;
            players[1].points += yaku.pts;
            renderOpponents();
            showResult(false, yaku);
            return;
          }
          // 不要牌を捨てる（最も少ない種類をランダムで）
          const counts=getCounts(cpuHand);
          let min=10, candidates=[];
          counts.forEach((c,i)=>{ if(c>0 && c<min){ min=c; candidates=[i]; } else if(c===min) candidates.push(i); });
          const discardId = candidates[Math.floor(Math.random()*candidates.length)];
          const idx = cpuHand.findIndex(id=>id===discardId);
          cpuHand.splice(idx,1);
          players[1].discard.push(discardId);
          setMsg(`CPUが${PIECE_TYPES[discardId].name}を捨てました`);
          broadcastDiscard(discardId);
          renderOpponents();
        }
        nextTurn();
      }

      function broadcastDraw(pieceId){
        // CPU対戦では自分への通知のみ（既に表示済み）
      }
      function broadcastDiscard(pieceId){
        // CPUが捨てた牌を表示（renderOpponentsで更新）
        renderOpponents();
      }
      function nextTurn(){
        if(gameFinished) return;
        currentPlayerIndex = (currentPlayerIndex+1) % players.length;
        renderOpponents();
        if(currentPlayerIndex===myPlayerId){
          setMsg('あなたの番です');
          if(!inReach && getMyHand().length===8){
            const options=getReachOptions(getMyHand());
            if(options.length>0) showReachOptions(options);
          }
        } else {
          setMsg('CPUの番です');
          setTimeout(cpuTurn, 1000);
        }
      }

      // ---- オンライン対戦（ホスト管理） ----
      function setupHost(roomCode){
        isHost=true; roomId=roomCode;
        peer = new Peer(roomCode);
        peer.on('open',()=>{
          DOM.connectionStatus.textContent='部屋を作成しました';
          updateRoomPlayers();
        });
        peer.on('connection', conn=>{
          const playerId = Object.keys(connections).length+1;
          connections[playerId] = conn;
          conn.on('data', data=>handleHostMessage(data, playerId));
          conn.on('close',()=>{ delete connections[playerId]; updateRoomPlayers(); });
          updateRoomPlayers();
          if(Object.keys(connections).length>=1 && Object.keys(connections).length<=3){
            DOM.startGameBtn.style.display='inline-block';
          }
        });
        DOM.startGameBtn.addEventListener('click', startOnlineGame);
      }

      function joinRoom(roomCode){
        isHost=false;
        peer = new Peer('guest-'+Math.random().toString(36).slice(2));
        peer.on('open',()=>{
          const conn = peer.connect(roomCode);
          connections[0] = conn;
          conn.on('data', data=>handleGuestMessage(data));
          conn.on('open',()=> DOM.connectionStatus.textContent='接続完了');
        });
      }

      function startOnlineGame(){
        const playerCount = Object.keys(connections).length+1;
        if(playerCount<2) return;
        box=createBox();
        players=[{name:'ホスト', hand:box.splice(0,8), discard:[], points:totalPoints}];
        Object.values(connections).forEach((conn,idx)=>{
          conn.send({type:'start', playerId:idx+1, hand:box.splice(0,8), box:[...box], players:players.map(p=>({name:p.name, points:p.points}))});
          players.push({name:`プレイヤー${idx+1}`, hand:[], discard:[], points:300});
        });
        myPlayerId=0; currentPlayerIndex=0; gameFinished=false;
        DOM.startGameBtn.style.display='none';
        updateBox(); renderHand(); renderMyDiscard(); renderOpponents();
        setMsg('ゲーム開始！あなたの番です');
      }

      function handleHostMessage(data, playerId){
        if(data.type==='discard'){
          players[playerId].hand = data.hand;
          players[playerId].discard = data.discard;
          broadcastToOthers(playerId, {type:'opponentDiscard', playerId:playerId, discard:data.discard, handCount:data.hand.length});
          nextTurnOnline();
        } else if(data.type==='win'){
          const yaku=data.yaku;
          players[playerId].points += yaku.pts;
          // 他のプレイヤーから減点
          players.forEach((p,idx)=>{ if(idx!==playerId) p.points -= yaku.pts; });
          broadcastToAll({type:'gameOver', winner:playerId, yaku:yaku});
          gameFinished=true;
        }
      }

      function handleGuestMessage(data){
        if(data.type==='start'){
          myPlayerId=data.playerId;
          box=data.box; hand=data.hand;
          players=data.players;
          players[myPlayerId] = {name:'あなた', hand:data.hand, discard:[], points:300};
          currentPlayerIndex=0; gameFinished=false;
          updateBox(); renderHand(); renderMyDiscard(); renderOpponents();
          setMsg('ゲーム開始！');
        } else if(data.type==='opponentDiscard'){
          const p=players[data.playerId];
          if(p){ p.discard=data.discard; p.hand=Array(data.handCount).fill(0); }
          renderOpponents();
          if(currentPlayerIndex===myPlayerId) setMsg('あなたの番です');
        } else if(data.type==='gameOver'){
          const yaku=data.yaku;
          if(data.winner===myPlayerId){
            totalPoints += yaku.pts; players[myPlayerId].points=totalPoints;
            showResult(true, yaku);
          } else {
            totalPoints -= yaku.pts; players[myPlayerId].points=totalPoints;
            showResult(false, yaku);
          }
        }
      }

      function sendToHost(data){ if(connections[0]) connections[0].send(data); }
      function broadcastToOthers(senderId, data){
        Object.entries(connections).forEach(([id,conn])=>{ if(parseInt(id)!==senderId) conn.send(data); });
      }
      function broadcastToAll(data){
        Object.values(connections).forEach(conn=>conn.send(data));
        // 自分自身にも適用
        if(data.type==='gameOver'){ /* 自分の処理は別途 */ }
      }

      function nextTurnOnline(){
        currentPlayerIndex = (currentPlayerIndex+1) % players.length;
        if(currentPlayerIndex===myPlayerId){
          setMsg('あなたの番です');
          if(!inReach && getMyHand().length===8){
            const options=getReachOptions(getMyHand());
            if(options.length>0) showReachOptions(options);
          }
        } else {
          setMsg('相手の番です');
        }
      }

      function updateRoomPlayers(){
        const count = Object.keys(connections).length+1;
        DOM.roomPlayers.textContent = `参加者: ${count}人`;
      }

      // ---- モード切替 ----
      document.getElementById('soloModeBtn').addEventListener('click',()=>{
        currentMode='cpu'; DOM.p2pArea.style.display='none';
        document.getElementById('soloModeBtn').classList.add('active');
        document.getElementById('battleModeBtn').classList.remove('active');
        newCpuGame();
      });
      document.getElementById('battleModeBtn').addEventListener('click',()=>{
        currentMode='online'; DOM.p2pArea.style.display='block';
        document.getElementById('battleModeBtn').classList.add('active');
        document.getElementById('soloModeBtn').classList.remove('active');
      });
      document.getElementById('createRoomBtn').addEventListener('click',()=>{
        const code=document.getElementById('roomCodeInput').value.trim();
        if(!/^\d{4,6}$/.test(code)) return;
        setupHost(code);
      });
      document.getElementById('joinRoomBtn').addEventListener('click',()=>{
        const code=document.getElementById('joinCodeInput').value.trim();
        if(!code) return;
        joinRoom(code);
      });
      document.getElementById('boxImage').addEventListener('click', drawFromBox);
      document.getElementById('newGameBtn').addEventListener('click', ()=>{
        if(currentMode==='cpu') newCpuGame();
      });
      document.getElementById('resetPointsBtn').addEventListener('click',()=>{
        totalPoints=300; DOM.totalPoints.textContent=300;
      });

      const discardBtn = document.createElement('button');
      discardBtn.className='btn'; discardBtn.textContent='🗑️ 選択した牌を捨てる';
      discardBtn.addEventListener('click', confirmDiscard);
      document.getElementById('gameArea').insertBefore(discardBtn, document.getElementById('messageArea'));

      // 初期起動
      newCpuGame();
      DOM.totalPoints.textContent = totalPoints;
    }
  </script>
</body>
</html>
