<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>チロルジャン 2009</title>
  <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
    body {
      font-family: 'Hiragino Sans', sans-serif; background: #fdf6ec; color: #4a3b2f;
      display: flex; flex-direction: column; align-items: center; padding: 8px 8px 30px; min-height: 100vh;
    }
    h1 { font-size: 1.6rem; color: #8b5a2b; margin: 6px 0 2px; }

    #passwordScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #fdf6ec; display: flex; align-items: center; justify-content: center;
      z-index: 200; flex-direction: column; gap: 12px;
    }
    #passwordInput {
      padding: 10px 16px; border-radius: 24px; border: 2px solid #d49b3b;
      font-size: 1rem; width: 200px; text-align: center;
    }

    .mode-bar { display: flex; gap: 8px; margin: 6px 0; }
    .mode-btn {
      padding: 6px 16px; border-radius: 20px; border: 2px solid #d49b3b;
      background: #fff; font-weight: bold; cursor: pointer;
    }
    .mode-btn.active { background: #f0c27a; border-color: #b37b44; }
    .container { width: 100%; max-width: 500px; }
    .yaku-banner {
      width: 100%; height: 140px; background: #f7ede0; border: 2px dashed #c9a87c;
      border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center;
      justify-content: center; overflow: hidden;
    }
    .yaku-banner img { max-height: 100%; max-width: 100%; object-fit: contain; }

    .hand-area {
      display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 70px; margin: 6px 0;
    }
    .piece-slot {
      width: 60px; height: 60px; background: #f5e1c4; border-radius: 12px;
      border: 3px solid #c9a16e; cursor: pointer; background-size: cover; transition: 0.1s;
    }
    .piece-slot img { width: 100%; height: 100%; border-radius: 9px; object-fit: cover; }
    .piece-slot.empty { background: #f3ede5; border: 2px dashed #d6c3a5; cursor: default; }
    .piece-slot.selected { border-color: #e05a2a; box-shadow: 0 0 8px #e05a2a; }

    .box-section { display: flex; align-items: center; justify-content: center; gap: 12px; margin: 10px 0; }
    .box-image {
      width: 80px; height: 80px; background: #d9b382; border-radius: 16px;
      border: 4px solid #b78b5a; cursor: pointer; background-size: cover;
    }
    .btn {
      background: #f0c27a; border: none; border-radius: 30px; padding: 10px 20px;
      font-weight: bold; font-size: 0.95rem; color: #4a3b2f; box-shadow: 0 4px 0 #b37b44;
      margin: 4px; cursor: pointer; transition: 0.08s;
    }
    .btn:active { transform: translateY(3px); box-shadow: 0 1px 0 #b37b44; }
    .btn:disabled { opacity: 0.4; pointer-events: none; }

    .message { font-weight: bold; margin: 6px 0; color: #b45f2a; text-align: center; }
    .opponent-area {
      background: #fef9f0; border-radius: 20px; padding: 12px; margin: 6px 0;
      border: 2px solid #e6c89e;
    }
    .discard-history { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
    .discard-chip {
      width: 36px; height: 36px; border-radius: 8px; background: #f5e1c4;
      border: 2px solid #aaa; display: flex; align-items: center; justify-content: center;
    }

    .room-area {
      background: #fffbf2; border: 2px solid #d49b3b; border-radius: 16px;
      padding: 12px; margin: 10px 0; width: 100%; max-width: 500px; text-align: center;
    }
    .room-id {
      font-size: 2.5rem; font-weight: bold; letter-spacing: 0.2em; color: #8b5a2b;
      background: #f7ede0; padding: 8px 20px; border-radius: 16px; display: inline-block; margin: 8px;
    }
    .room-input {
      padding: 8px 12px; font-size: 1.5rem; width: 150px; text-align: center;
      border-radius: 12px; border: 2px solid #d49b3b;
    }

    .rules-box {
      background: #fffbf2; border: 2px solid #e6c89e; border-radius: 16px;
      padding: 10px; margin: 8px 0; font-size: 0.75rem; max-width: 500px;
    }
  </style>
</head>
<body>
  <div id="passwordScreen">
    <h2>🔐 パスワードを入力</h2>
    <input type="password" id="passwordInput" placeholder="パスワード">
    <button class="btn" id="passwordSubmitBtn">入室</button>
    <p id="passwordError" style="color:#a33; font-size:0.9rem;"></p>
  </div>

  <div id="mainApp" style="display:none; flex-direction:column; align-items:center; width:100%;">
    <h1>🍫チロルジャン 2009</h1>
    <div class="mode-bar">
      <button class="mode-btn active" id="soloModeBtn">🧑‍💻 ソロ</button>
      <button class="mode-btn" id="battleModeBtn">⚔️ 対戦</button>
    </div>

    <div class="rules-box">
      <details>
        <summary>📖 ルール</summary>
        ・8枚スタート→引いて9枚→不要牌を捨てる<br>
        ・3枚セット×3組でアガリ（9枚）<br>
        ・相手の捨て牌でもアガれる（ロン）<br>
        ・役に応じて得点獲得
      </details>
    </div>

    <div id="p2pArea" style="display:none; width:100%; max-width:500px; text-align:center;">
      <div class="room-area" id="roomSetup">
        <p><strong>対戦を始める</strong></p>
        <button class="btn" id="createRoomBtn">📝 合言葉を作る</button>
        <div style="margin-top:10px;">または</div>
        <input class="room-input" type="text" id="roomIdInput" placeholder="合言葉" maxlength="10">
        <button class="btn" id="joinRoomBtn">🔑 合言葉で参加</button>
      </div>
      <div class="room-area" id="roomInfo" style="display:none;">
        <p>この合言葉を相手に伝えてください</p>
        <div class="room-id" id="roomIdDisplay"></div>
        <button class="btn" id="copyRoomBtn">📋 コピー</button>
      </div>
      <div id="connectionStatus" style="margin-top:8px;">未接続</div>
    </div>

    <div id="opponentArea" class="opponent-area" style="display:none;">
      <div>🤝 相手の手札: <span id="opponentHandCount">0</span>枚</div>
      <div style="font-size:0.8rem;">捨て牌（タップでロン可能）:</div>
      <div class="discard-history" id="opponentDiscardHistory"></div>
    </div>

    <div class="container" id="gameArea">
      <div class="yaku-banner" id="yakuBanner">
        <img src="" alt="役一覧" id="yakuBannerImg">
      </div>
      <div class="hand-area" id="handContainer"></div>
      <div class="box-section">
        <div class="box-image" id="boxImage"></div>
        <div>残り <span id="boxRemaining">84</span> 枚</div>
      </div>
      <div style="display:flex; justify-content:center; gap:8px; flex-wrap:wrap;">
        <button class="btn" id="newGameBtn">🔄 新しいゲーム</button>
        <button class="btn" id="resetPointsBtn">💰 ポイントリセット</button>
      </div>
      <div class="message" id="messageArea"></div>
      <div>持ち点: <span id="totalPoints">300</span>pt</div>
    </div>
  </div>

  <script>
    const GAME_PASSWORD = '1606tamani';
    const IMAGE_BASE_URL = 'https://raw.githubusercontent.com/tamani3901/Tyrolean/main/img/';

    document.getElementById('passwordSubmitBtn').addEventListener('click', () => {
      if (document.getElementById('passwordInput').value === GAME_PASSWORD) {
        document.getElementById('passwordScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        initGame();
      } else {
        document.getElementById('passwordError').textContent = 'パスワードが違います';
      }
    });

    function initGame() {
      document.getElementById('yakuBannerImg').src = IMAGE_BASE_URL + 'yaku_all.png';

      const PIECE_TYPES = [
        { id:0, name:'コーヒーヌガー', color:'brown', count:9, file:'coffee_nougat.png' },
        { id:1, name:'ホワイトビス',   color:'blue',  count:6, file:'white_bis.png' },
        { id:2, name:'ミルク',         color:'white', count:9, file:'milk.png' },
        { id:3, name:'コーヒーフロート', color:'brown', count:6, file:'coffee_float.png' },
        { id:4, name:'シナモンオレ',   color:'skin',  count:6, file:'cinnamon_ole.png' },
        { id:5, name:'バニラプリン',   color:'skin',  count:6, file:'vanilla_pudding.png' },
        { id:6, name:'塩バニラ',       color:'blue',  count:6, file:'salt_vanilla.png' },
        { id:7, name:'きなこ',         color:'skin',  count:9, file:'kinako.png' },
        { id:8, name:'いちご大福',     color:'white', count:6, file:'ichigo_daifuku.png' },
        { id:9, name:'みるく大福',     color:'white', count:6, file:'milk_daifuku.png' },
        { id:10,name:'アーモンド',     color:'blue',  count:9, file:'almond.png' },
        { id:11,name:'ヘーゼルナッツ', color:'brown', count:6, file:'hazelnut.png' }
      ].map(t => ({ ...t, img: IMAGE_BASE_URL + t.file }));

      const YAKU_LIST = [
        { name:'オールワン', pts:300, check:c=>c.some(v=>v===9) },
        { name:'タブルセット', pts:150, check:c=>c.some(v=>v>=6) },
        { name:'ワンカラーセット', pts:90, check:(c,hand)=>hand.every(id=>PIECE_TYPES[id].color===PIECE_TYPES[hand[0]].color) },
        { name:'ミルクセット', pts:120, check:c=>c[2]===3&&c[9]===3&&c[6]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'おもちセット', pts:120, check:c=>c[7]===3&&c[8]===3&&c[9]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'ドリンクセット', pts:90, check:c=>c[2]===3&&c[3]===3&&c[4]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'サクサクおやつセット', pts:90, check:c=>c[10]===3&&c[1]===3&&c[11]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'キャラセット', pts:75, check:c=>{
          const allowed=[10,5,3,7,11]; const present=allowed.filter(i=>c[i]>0);
          return present.length===3 && present.every(i=>c[i]===3) && allowed.every(i=>c[i]===3||c[i]===0) && c.reduce((a,b)=>a+b,0)===9;
        }},
        { name:'基本セット', pts:60, check:c=>c[0]===3&&c[2]===3&&c[10]===3&&c.reduce((a,b)=>a+b,0)===9 },
        { name:'アフタヌーンセット', pts:45, check:c=>{
          if(c[2]!==3) return false; const a=[0,1], b=[3,4,5,6];
          const aHit=a.filter(i=>c[i]===3), bHit=b.filter(i=>c[i]===3);
          if(aHit.length!==1||bHit.length!==1) return false;
          return c.every((v,i)=>(i===2||i===aHit[0]||i===bHit[0])?v===3:v===0);
        }},
        { name:'バラエティ', pts:30, check:c=>{
          const non=[1,3,4,5,6,7,8,9,11]; return non.every(i=>c[i]===1) && c[0]===0&&c[2]===0&&c[10]===0;
        }}
      ];

      let box=[], hand=[], totalPoints=300, gameFinished=false;
      let currentMode='solo';
      let peer = null, conn = null;
      let isParent=false, myTurn=false, opponentHandCount=0;
      let opponentDiscardHistory=[], myDiscardHistory=[];
      let selectedDiscardIndex=null;

      const DOM = {
        handContainer: document.getElementById('handContainer'),
        boxRemaining: document.getElementById('boxRemaining'),
        messageArea: document.getElementById('messageArea'),
        totalPoints: document.getElementById('totalPoints'),
        opponentHandCount: document.getElementById('opponentHandCount'),
        opponentDiscardHistory: document.getElementById('opponentDiscardHistory'),
        opponentArea: document.getElementById('opponentArea'),
        p2pArea: document.getElementById('p2pArea'),
        connectionStatus: document.getElementById('connectionStatus'),
        roomSetup: document.getElementById('roomSetup'),
        roomInfo: document.getElementById('roomInfo'),
        roomIdDisplay: document.getElementById('roomIdDisplay'),
        roomIdInput: document.getElementById('roomIdInput'),
      };

      function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } return a; }
      function createBox(){ const p=[]; PIECE_TYPES.forEach((t,i)=>{ for(let j=0;j<t.count;j++) p.push(i); }); return shuffle(p); }
      function getCounts(h){ const c=Array(12).fill(0); h.forEach(id=>c[id]++); return c; }
      function checkYaku(h){
        const c=getCounts(h);
        for(let y of YAKU_LIST) if(y.check(c,h)) return {name:y.name, pts:y.pts};
        let triple=0; for(let i=0;i<c.length;i++) triple+=Math.floor(c[i]/3);
        return {name:`なんでも3種 ×${Math.min(3,triple)}`, pts:Math.min(3,triple)*15};
      }

      function renderHand(){
        DOM.handContainer.innerHTML='';
        for(let i=0;i<9;i++){
          const s=document.createElement('div'); s.className='piece-slot';
          if(i<hand.length){
            const t=PIECE_TYPES[hand[i]];
            const img=document.createElement('img'); img.src=t.img; img.alt=t.name;
            s.appendChild(img);
            s.addEventListener('click',()=>selectDiscard(i));
          }else s.classList.add('empty');
          DOM.handContainer.appendChild(s);
        }
      }

      function selectDiscard(index) {
        if (!myTurn || hand.length !== 9) { setMsg('9枚のときに捨てる牌を選んでください', false); return; }
        const slots = DOM.handContainer.querySelectorAll('.piece-slot');
        slots.forEach(s => s.classList.remove('selected'));
        selectedDiscardIndex = index;
        slots[index].classList.add('selected');
        setMsg(`「${PIECE_TYPES[hand[index]].name}」を捨てますか？ もう一度タップで決定`, true);
      }

      function confirmDiscard() {
        if (selectedDiscardIndex === null || hand.length !== 9) { setMsg('捨てる牌を選んでください', false); return; }
        const piece = hand.splice(selectedDiscardIndex, 1)[0];
        myDiscardHistory.push(piece);
        sendToPeer({type:'discard', pieceId:piece, hand:hand, discardHistory:myDiscardHistory});
        renderHand(); myTurn = false; selectedDiscardIndex = null;
        setMsg(`${PIECE_TYPES[piece].name}を捨てました。相手の番です`);
      }

      function updateBox(){ DOM.boxRemaining.textContent=box.length; }
      function setMsg(t,good=true){ DOM.messageArea.textContent=t; DOM.messageArea.style.color=good?'#b45f2a':'#a33'; }

      function drawFromBox(){
        if (!myTurn || hand.length >= 9 || box.length === 0) return;
        if (hand.length !== 8) { setMsg('8枚のときに引いてください', false); return; }
        const id = box.pop(); hand.push(id); updateBox(); renderHand();
        if (hand.length === 9) {
          const y = checkYaku(hand);
          if (y.pts > 0) {
            sendToPeer({type:'win', yaku:y, method:'tsumo'});
            setMsg(`🎉 ツモ！ ${y.name} +${y.pts}pt`);
            totalPoints += y.pts; DOM.totalPoints.textContent = totalPoints;
            gameFinished = true; myTurn = false;
            return;
          } else { setMsg('役がありません。捨てる牌を選んで「捨てる」ボタンを押してください'); }
        } else { setMsg(`${PIECE_TYPES[id].name}を引きました`); }
      }

      function ronWithDiscard(discardId) {
        if (!myTurn || hand.length !== 8) return;
        const testHand = [...hand, discardId];
        const yaku = checkYaku(testHand);
        if (yaku.pts > 0) {
          hand.push(discardId);
          sendToPeer({type:'win', yaku:yaku, method:'ron', discardId:discardId});
          setMsg(`🎉 ロン！ ${yaku.name} +${yaku.pts}pt`);
          totalPoints += yaku.pts; DOM.totalPoints.textContent = totalPoints;
          gameFinished = true; myTurn = false;
          renderHand();
        } else { setMsg('その牌ではアガれません', false); }
      }

      function newSoloGame(){
        box=createBox(); hand=box.splice(0,8); gameFinished=false; myTurn=true;
        updateBox(); renderHand(); setMsg('8枚配られました。箱をタップして1枚引いてください');
      }

      // ---- PeerJS接続 ----
      function setupPeerConnection() {
        if (peer) peer.destroy();
        peer = new Peer();
        peer.on('open', (id) => {
          // 合言葉作成ボタンで使う
        });
        peer.on('connection', (incomingConn) => {
          conn = incomingConn;
          setupConnectionEvents();
        });
        peer.on('error', (err) => {
          setMsg('接続エラー: ' + err.type, false);
        });
      }

      function setupConnectionEvents() {
        conn.on('open', () => {
          DOM.connectionStatus.textContent = '接続完了！';
          DOM.opponentArea.style.display = 'block';
          // 最初のゲーム状態をやり取り
          if (isParent) {
            startP2PGame();
          }
        });
        conn.on('data', (data) => {
          if (data.type === 'draw') {
            hand = data.hand; box = data.box; updateBox(); renderHand();
            if (hand.length === 9) {
              const y = checkYaku(hand);
              if (y.pts > 0) {
                sendToPeer({type:'win', yaku:y, method:'tsumo'});
                setMsg(`🎉 ツモ！ ${y.name} +${y.pts}pt`);
                totalPoints += y.pts; DOM.totalPoints.textContent = totalPoints;
                gameFinished = true; myTurn = false;
                return;
              }
            }
            myTurn = true; setMsg('あなたの番です。捨てる牌を選んでください');
          } else if (data.type === 'discard') {
            opponentDiscardHistory = data.discardHistory;
            opponentHandCount = data.hand.length;
            DOM.opponentHandCount.textContent = opponentHandCount;
            renderOpponentDiscard();
            myTurn = true;
            setMsg('あなたの番です。箱から引くか、相手の捨て牌でロンできます');
          } else if (data.type === 'win') {
            setMsg(`相手の${data.method==='ron'?'ロン':'ツモ'}！ ${data.yaku.name}`, false);
            gameFinished = true; myTurn = false;
          } else if (data.type === 'start') {
            isParent = data.isParent;
            box = data.box; hand = data.hand;
            opponentHandCount = 8;
            myTurn = isParent;
            updateBox(); renderHand();
            DOM.opponentHandCount.textContent = opponentHandCount;
            setMsg(isParent?'あなたが親です。箱をタップして引いてください':'相手が親です。待機してください');
          }
        });
      }

      function sendToPeer(data){ if(conn && conn.open) conn.send(data); }

      function renderOpponentDiscard(){
        DOM.opponentDiscardHistory.innerHTML='';
        opponentDiscardHistory.forEach(id=>{
          const chip=document.createElement('div'); chip.className='discard-chip';
          const img=document.createElement('img'); img.src=PIECE_TYPES[id].img; img.style.width='100%';
          chip.addEventListener('click', () => ronWithDiscard(id));
          chip.appendChild(img);
          DOM.opponentDiscardHistory.appendChild(chip);
        });
      }

      function startP2PGame(){
        myDiscardHistory=[]; opponentDiscardHistory=[];
        box=createBox(); hand=box.splice(0,8);
        const oppHand=box.splice(0,8);
        sendToPeer({type:'start', isParent:false, box, hand: oppHand});
        myTurn = isParent;
        updateBox(); renderHand();
        DOM.opponentHandCount.textContent = 8;
        setMsg(isParent?'親です。箱をタップして引いてください':'相手の番です');
      }

      // ---- 合言葉UI ----
      document.getElementById('createRoomBtn').addEventListener('click', () => {
        isParent = true;
        setupPeerConnection();
        peer.on('open', (id) => {
          const roomId = id.slice(0, 6); // 短縮ID
          DOM.roomIdDisplay.textContent = roomId;
          DOM.roomSetup.style.display = 'none';
          DOM.roomInfo.style.display = 'block';
          DOM.connectionStatus.textContent = '相手の接続待ち...';
        });
        // 相手からの接続は peer.on('connection') で待つ
      });

      document.getElementById('joinRoomBtn').addEventListener('click', () => {
        const roomId = DOM.roomIdInput.value.trim();
        if (!roomId) return;
        isParent = false;
        setupPeerConnection();
        conn = peer.connect(roomId);
        setupConnectionEvents();
        DOM.roomSetup.style.display = 'none';
        DOM.roomInfo.style.display = 'none';
        DOM.connectionStatus.textContent = '接続中...';
      });

      document.getElementById('copyRoomBtn').addEventListener('click', () => {
        const text = DOM.roomIdDisplay.textContent;
        navigator.clipboard.writeText(text).then(() => setMsg('合言葉をコピーしました'));
      });

      // モード切替
      document.getElementById('soloModeBtn').addEventListener('click',()=>{
        currentMode='solo'; DOM.p2pArea.style.display='none'; DOM.opponentArea.style.display='none';
        if (conn) conn.close(); if (peer) peer.destroy();
        newSoloGame();
        document.getElementById('soloModeBtn').classList.add('active');
        document.getElementById('battleModeBtn').classList.remove('active');
      });
      document.getElementById('battleModeBtn').addEventListener('click',()=>{
        currentMode='battle'; DOM.p2pArea.style.display='block'; DOM.opponentArea.style.display='none';
        DOM.roomSetup.style.display='block'; DOM.roomInfo.style.display='none';
        DOM.connectionStatus.textContent='未接続';
        document.getElementById('battleModeBtn').classList.add('active');
        document.getElementById('soloModeBtn').classList.remove('active');
      });

      document.getElementById('boxImage').addEventListener('click', drawFromBox);
      document.getElementById('newGameBtn').addEventListener('click', ()=>{
        if(currentMode==='solo') newSoloGame();
        else if (isParent && conn && conn.open) startP2PGame();
      });
      document.getElementById('resetPointsBtn').addEventListener('click',()=>{
        totalPoints=300; DOM.totalPoints.textContent=300;
      });

      // 捨てるボタン
      const discardBtn = document.createElement('button');
      discardBtn.className = 'btn';
      discardBtn.textContent = '🗑️ 選択した牌を捨てる';
      discardBtn.addEventListener('click', confirmDiscard);
      document.getElementById('gameArea').insertBefore(discardBtn, document.getElementById('messageArea'));

      newSoloGame();
      DOM.totalPoints.textContent = totalPoints;
    }
  </script>
</body>
</html>
